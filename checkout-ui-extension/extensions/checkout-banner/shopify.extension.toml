api_version = "2025-07"

[[extensions]]
name = "checkout-banner"
handle = "checkout-banner"
uid = "checkout-banner-uid-001"
type = "ui_extension"

[[extensions.targeting]]
target = "purchase.checkout.block.render"
module = "./src/CheckoutBanner.jsx"

[extensions.capabilities]
network_access = false
block_progress = false

[extensions.settings]
[[extensions.settings.fields]]
key = "banner_status"
type = "single_line_text_field"
name = "Banner Status"
description = "Status of the banner (info, success, warning, critical)"
default = "warning"

[[extensions.settings.fields]]
key = "banner_title"
type = "single_line_text_field"
name = "Banner Title"
description = "Title text for the banner (leave empty for no title)"

[[extensions.settings.fields]]
key = "banner_message"
type = "multi_line_text_field"
name = "Banner Message"
description = "Main message content for the banner"
default = "We're currently going viral, so due to high demand, we can only reserve your order for 10 more minutes, Production capacity almost reached."

[[extensions.settings.fields]]
key = "show_countdown"
type = "boolean"
name = "Show Countdown"
description = "Display countdown timer in the banner"
default = false

[[extensions.settings.fields]]
key = "countdown_duration"
type = "number_integer"
name = "Countdown Duration (seconds)"
description = "Duration of countdown in seconds (e.g., 600 for 10 minutes)"
default = 600

[[extensions.settings.fields]]
key = "is_dismissible"
type = "boolean"
name = "Dismissible"
description = "Allow customers to dismiss the banner"
default = false