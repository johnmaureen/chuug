<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter Test</title>
    <link rel="stylesheet" href="assets/mini-atc-modal.css">
    <style>
        body {
            padding: 50px;
            font-family: Arial, sans-serif;
        }
        .test-container {
            background: #f2f2ee;
            padding: 30px;
            border-radius: 10px;
            max-width: 600px;
        }
    </style>
</head>
<body>
    <h1>Mini ATC Modal Counter Test</h1>
    
    <div class="test-container">
        <h2>Test Counter Functionality</h2>
        
        <!-- Test counter structure matching the modal -->
        <div class="mini-atc-modal__variant-row" data-variant-id="variant-1" data-personalization="mix-match">
          <div class="mini-atc-modal__variant-image">
            <img 
              src="assets/midnight_charcoal.png" 
              alt="Midnight Black Cup" 
              width="37" 
              height="64"
            />
          </div>
          
          <div class="mini-atc-modal__variant-details">
            <div class="mini-atc-modal__variant-info">
              <h6 class="mini-atc-modal__variant-name">Midnight Black</h6>
              <p class="mini-atc-modal__variant-description">Matches most CHUUGs</p>
            </div>
            
            <div class="mini-atc-modal__variant-controls">
              <div class="mini-atc-modal__counter" role="group">
                <button 
                  type="button"
                  class="mini-atc-modal__counter-btn mini-atc-modal__counter-decrement" 
                  aria-label="Decrease quantity of Midnight Black"
                  data-variant-action="decrement"
                  data-variant-id="variant-1"
                >
                  <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <circle cx="10" cy="10" r="9.5" fill="transparent" stroke="#0D2026" stroke-opacity="0.1"/>
                    <line x1="6" y1="10" x2="14" y2="10" stroke="#0D2026" stroke-width="1" stroke-linecap="round"/>
                  </svg>
                </button>
                
                <div 
                  class="mini-atc-modal__counter-value" 
                  aria-live="polite"
                  aria-atomic="true"
                  data-variant-quantity="variant-1"
                >1</div>
                
                <button 
                  type="button"
                  class="mini-atc-modal__counter-btn mini-atc-modal__counter-increment" 
                  aria-label="Increase quantity of Midnight Black"
                  data-variant-action="increment"
                  data-variant-id="variant-1"
                >
                  <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <circle cx="10" cy="10" r="9.5" fill="transparent" stroke="#0D2026" stroke-opacity="0.1"/>
                    <line x1="10" y1="6" x2="10" y2="14" stroke="#0D2026" stroke-width="1" stroke-linecap="round"/>
                    <line x1="6" y1="10" x2="14" y2="10" stroke="#0D2026" stroke-width="1" stroke-linecap="round"/>
                  </svg>
                </button>
              </div>
              
              <div 
                class="mini-atc-modal__variant-price" 
                aria-live="polite"
                data-variant-price="variant-1"
                data-base-price="1299"
              >
                £12.99
              </div>
            </div>
          </div>
        </div>
    </div>

    <!-- Simple fallback counter test -->
    <div class="test-container" style="margin-top: 30px;">
        <h2>Fallback Counter Test</h2>
        <div style="display: flex; align-items: center; gap: 10px;">
            <button onclick="decrementTest()" style="padding: 10px;">-</button>
            <span id="test-counter" style="padding: 10px; background: white; border: 1px solid #ccc;">1</span>
            <button onclick="incrementTest()" style="padding: 10px;">+</button>
        </div>
    </div>

    <script src="assets/mini-atc-modal.js"></script>
    <script>
        // Simple fallback counter for testing
        let testCount = 1;
        
        function decrementTest() {
            testCount = Math.max(0, testCount - 1);
            document.getElementById('test-counter').textContent = testCount;
            console.log('Fallback decrement:', testCount);
        }
        
        function incrementTest() {
            testCount = Math.min(99, testCount + 1);
            document.getElementById('test-counter').textContent = testCount;
            console.log('Fallback increment:', testCount);
        }

        // Test the mini ATC modal counter functionality
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Counter test page loaded');
            
            // Test if MiniATCModal is available
            setTimeout(() => {
                if (window.MiniATCModal) {
                    console.log('✅ MiniATCModal loaded successfully');
                } else {
                    console.error('❌ MiniATCModal not available');
                }
            }, 100);
            
            // Add manual click listeners to test counter buttons
            const counterButtons = document.querySelectorAll('[data-variant-action]');
            console.log('Found counter buttons:', counterButtons.length);
            
            counterButtons.forEach(button => {
                button.addEventListener('click', function(e) {
                    console.log('Counter button clicked:', {
                        action: this.getAttribute('data-variant-action'),
                        variantId: this.getAttribute('data-variant-id'),
                        button: this
                    });
                    
                    // Manual counter logic for testing
                    const action = this.getAttribute('data-variant-action');
                    const variantId = this.getAttribute('data-variant-id');
                    const counter = this.closest('.mini-atc-modal__counter');
                    const valueEl = counter.querySelector('[data-variant-quantity]');
                    
                    console.log('Counter elements found:', {
                        counter: !!counter,
                        valueEl: !!valueEl,
                        currentValue: valueEl ? valueEl.textContent : 'not found'
                    });
                    
                    if (valueEl) {
                        let currentValue = parseInt(valueEl.textContent) || 0;
                        
                        if (action === 'increment') {
                            currentValue = Math.min(currentValue + 1, 99);
                        } else if (action === 'decrement') {
                            currentValue = Math.max(currentValue - 1, 0);
                        }
                        
                        valueEl.textContent = currentValue;
                        console.log('Updated counter to:', currentValue);
                        
                        // Update price
                        const priceEl = counter.parentElement.querySelector('[data-variant-price]');
                        if (priceEl) {
                            const basePrice = parseInt(priceEl.getAttribute('data-base-price')) || 1299;
                            const totalPrice = currentValue * basePrice;
                            priceEl.textContent = `£${(totalPrice / 100).toFixed(2)}`;
                            console.log('Updated price to:', priceEl.textContent);
                        }
                    }
                });
            });
        });
    </script>
</body>
</html>
